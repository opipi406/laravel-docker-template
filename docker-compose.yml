version: "3"

services:
  web:
    container_name: "web"
    build:
      dockerfile: "./docker/web/Dockerfile"
    ports:
      - "8080:80"
    volumes:
      - "./src:/var/www/html"

  app:
    container_name: "app"
    build:
      dockerfile: "./docker/php/Dockerfile"
    volumes:
      - "./src:/var/www/html"

  db:
    container_name: "db"
    build:
      dockerfile: ./docker/db/Dockerfile
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: qweqwe
      MYSQL_DATABASE: laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: qweqwe
    volumes:
      - ./docker/db/data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    # platform: linux/amd64
    container_name: phpmyadmin
    depends_on:
      - db
    ports:
      - 8089:80

  mail:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"
    environment:
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /tmp
    # volumes:
    #   - ./maildir:/tmp
